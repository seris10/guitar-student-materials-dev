<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Song Bank - Guitar Club</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <script src="scripts/api.js"></script>

  <style>
    /* Song Bank Page Styles */
    .song-bank-page {
      min-height: 100vh;
      padding: 24px 32px 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .page-header h1 svg {
      width: 32px;
      height: 32px;
      color: var(--accent);
    }

    .page-header p {
      color: var(--text-secondary);
      font-size: 1.05rem;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
      padding: 16px 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-box input {
      width: 100%;
      padding: 12px 12px 12px 44px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    /* Filter Tabs */
    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg-tertiary);
      padding: 4px;
      border-radius: 10px;
    }

    .filter-tab {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-tab:hover {
      color: var(--text-primary);
    }

    .filter-tab.active {
      background: var(--accent);
      color: #000;
      font-weight: 600;
    }

    /* View Toggle */
    .view-toggle {
      display: flex;
      gap: 4px;
      background: var(--bg-tertiary);
      padding: 4px;
      border-radius: 10px;
    }

    .view-btn {
      padding: 8px 12px;
      background: transparent;
      border: none;
      border-radius: 8px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .view-btn svg {
      width: 18px;
      height: 18px;
    }

    .view-btn:hover {
      color: var(--text-primary);
    }

    .view-btn.active {
      background: var(--accent);
      color: #000;
    }

    /* Request Button */
    .btn-request {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: var(--accent-green);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-request:hover {
      background: #4ade80;
      transform: translateY(-1px);
    }

    .btn-request svg {
      width: 18px;
      height: 18px;
    }

    /* Stats Bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-item .count {
      font-weight: 600;
      color: var(--text-primary);
    }

    .stat-item.ready .count { color: var(--accent-green); }
    .stat-item.pending .count { color: var(--accent-orange); }

    /* Song Grid - Thumbnail View */
    .song-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .song-grid.compact-view {
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* Song Card */
    .sb-song-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.2s;
    }

    .sb-song-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .sb-song-card .thumbnail {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      background: var(--bg-tertiary);
    }

    .sb-song-card .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .sb-song-card:hover .thumbnail img {
      transform: scale(1.05);
    }

    .sb-song-card .play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .sb-song-card:hover .play-overlay {
      opacity: 1;
    }

    .sb-song-card .play-btn {
      width: 56px;
      height: 56px;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .sb-song-card .play-btn:hover {
      transform: scale(1.1);
    }

    .sb-song-card .play-btn svg {
      width: 24px;
      height: 24px;
      color: #000;
      margin-left: 3px;
    }

    .sb-song-card .status-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.ready {
      background: var(--accent-green);
      color: #000;
    }

    .status-badge.pending {
      background: var(--accent-orange);
      color: #000;
    }

    .sb-song-card .difficulty {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      gap: 4px;
    }

    .difficulty-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .difficulty-dot.filled {
      background: var(--accent-orange);
    }

    .sb-song-card .card-body {
      padding: 16px;
    }

    .sb-song-card .song-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--text-primary);
    }

    .sb-song-card .song-artist {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .sb-song-card .chord-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .chord-chip {
      padding: 4px 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .sb-song-card .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sb-song-card .meta-info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .meta-info span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .meta-info svg {
      width: 14px;
      height: 14px;
    }

    .sb-song-card .btn-open {
      padding: 8px 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .sb-song-card .btn-open:hover {
      background: #79c0ff;
    }

    /* Compact View Card */
    .compact-view .sb-song-card {
      display: flex;
      align-items: center;
    }

    .compact-view .sb-song-card .thumbnail {
      width: 120px;
      min-width: 120px;
      aspect-ratio: 16/9;
    }

    .compact-view .sb-song-card .card-body {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 12px 16px;
    }

    .compact-view .sb-song-card .song-info-compact {
      flex: 1;
      min-width: 0;
    }

    .compact-view .sb-song-card .song-title {
      margin-bottom: 2px;
    }

    .compact-view .sb-song-card .song-artist {
      margin-bottom: 0;
    }

    .compact-view .chord-chips {
      margin-bottom: 0;
      flex-shrink: 0;
    }

    .compact-view .status-badge {
      position: static;
      flex-shrink: 0;
    }

    .compact-view .difficulty {
      position: static;
      flex-shrink: 0;
    }

    /* Request Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 90%;
      max-width: 480px;
      padding: 28px;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal {
      transform: scale(1);
    }

    .modal h2 {
      font-size: 1.35rem;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .modal h2 svg {
      width: 24px;
      height: 24px;
      color: var(--accent-green);
    }

    .modal p {
      color: var(--text-secondary);
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    .modal .form-group {
      margin-bottom: 16px;
    }

    .modal label {
      display: block;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .modal input,
    .modal textarea {
      width: 100%;
      padding: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: inherit;
    }

    .modal input:focus,
    .modal textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal textarea {
      min-height: 80px;
      resize: vertical;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal .btn-cancel {
      flex: 1;
      padding: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal .btn-cancel:hover {
      border-color: var(--accent);
    }

    .modal .btn-submit {
      flex: 1;
      padding: 12px;
      background: var(--accent-green);
      border: none;
      border-radius: 10px;
      color: #000;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal .btn-submit:hover {
      background: #4ade80;
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 1.2rem;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .toolbar {
        flex-direction: column;
        align-items: stretch;
      }
      
      .search-box {
        width: 100%;
      }

      .filter-tabs {
        justify-content: center;
      }

      .view-toggle {
        justify-content: center;
      }

      .btn-request {
        justify-content: center;
      }

      .song-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

          <line x1="3" y1="6" x2="3.01" y2="6"/>
          <line x1="3" y1="12" x2="3.01" y2="12"/>
          <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
      </button>
    </div>

    <button class="btn-request" id="btnRequest">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Request Song
    </button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <span class="count" id="totalCount">8</span> songs
    </div>
    <div class="stat-item ready">
      <span class="count" id="readyCount">6</span> ready
    </div>
    <div class="stat-item pending">
      <span class="count" id="pendingCount">2</span> pending
    </div>
  </div>

  <!-- Song Grid -->
  <div class="song-grid" id="songGrid">
    <!-- Songs will be rendered by JS -->
  </div>
</main>

<!-- Request Song Modal -->
<div class="modal-backdrop" id="requestModal">
  <div class="modal">
    <h2>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18V5l12-2v13"/>
        <circle cx="6" cy="18" r="3"/>
        <circle cx="18" cy="16" r="3"/>
      </svg>
      Request a Song
    </h2>
    <p>Tell your teacher what song you'd like to learn!</p>
    
    <div class="form-group">
      <label for="reqTitle">Song Title *</label>
      <input type="text" id="reqTitle" placeholder="e.g., Wonderwall">
    </div>
    
    <div class="form-group">
      <label for="reqArtist">Artist *</label>
      <input type="text" id="reqArtist" placeholder="e.g., Oasis">
    </div>
    
    <div class="form-group">
      <label for="reqNotes">Notes (optional)</label>
      <textarea id="reqNotes" placeholder="Any specific version or details?"></textarea>
    </div>
    
    <div class="modal-actions">
      <button class="btn-cancel" id="btnCancelRequest">Cancel</button>
      <button class="btn-submit" id="btnSubmitRequest">Submit Request</button>
    </div>
  </div>
</div>

<script>
  // Default song data - fallback if API fails
  const defaultSongs = [
    {
      id: 1,
      title: "Remember Me (Lullaby)",
      artist: "from Coco",
      video_id: "KP_XkN2v7OM",
      chords: ["C", "G", "Am", "F"],
      difficulty: 2,
      status: "ready",
      capo: "No capo",
      style: "Fingerpicking",
      href: "songs/remember-me/"
    },
    {
      id: 2,
      title: "Hey Lover",
      artist: "The Daughters of Eve",
      video_id: "KbHaIbDKQMc",
      chords: ["G", "D", "Bm", "A"],
      difficulty: 2,
      status: "ready",
      capo: "Capo 1",
      style: "Strumming",
      href: "songs/hey-lover/"
    },
    {
      id: 3,
      title: "Seven Nation Army",
      artist: "The White Stripes",
      video_id: "0J2QdDbelmY",
      chords: [],
      difficulty: 1,
      status: "ready",
      capo: "No capo",
      style: "Riff",
      href: "songs/seven-nation-army/"
    }
  ];

  // Song data - loaded from API or defaults
  let songs = [];

  // Initialize songs from API with fallback to defaults
  async function initializeSongs() {
    try {
      if (window.GuitarAPI && typeof GuitarAPI.getSongs === 'function') {
        const apiSongs = await GuitarAPI.getSongs();
        // Map API response to match card rendering format
        songs = apiSongs.map(song => ({
          id: song.id || Date.now(),
          title: song.title,
          artist: song.artist,
          videoId: song.video_id || 'dQw4w9WgXcQ', // fallback
          video_id: song.video_id || 'dQw4w9WgXcQ',
          chords: song.chords || [],
          difficulty: song.difficulty || 2,
          status: song.status || 'pending',
          capo: song.capo || 'TBD',
          style: song.style || 'Acoustic',
          href: song.href || null
        }));
        console.log('Songs loaded from GuitarAPI:', songs.length);
      } else {
        throw new Error('GuitarAPI not available');
      }
    } catch (error) {
      console.warn('Failed to load songs from API, using defaults:', error);
      songs = JSON.parse(JSON.stringify(defaultSongs)); // deep copy
    }
    renderSongs();
  }

  // State
  let currentFilter = 'all';
  let currentView = 'grid';
  let searchQuery = '';

  // DOM Elements
  const songGrid = document.getElementById('songGrid');
  const searchInput = document.getElementById('searchInput');
  const filterTabs = document.querySelectorAll('.filter-tab');
  const viewBtns = document.querySelectorAll('.view-btn');
  const requestModal = document.getElementById('requestModal');

  // Render difficulty dots
  function renderDifficulty(level) {
    return Array(3).fill(0).map((_, i) => 
      `<span class="difficulty-dot ${i < level ? 'filled' : ''}"></span>`
    ).join('');
  }

  // Render a song card
  function renderSongCard(song) {
    const chordsHtml = song.chords.length > 0 
      ? song.chords.map(c => `<span class="chord-chip">${c}</span>`).join('')
      : `<span class="chord-chip">${song.style}</span>`;
    
    const videoId = song.videoId || song.video_id || 'dQw4w9WgXcQ';
    
    return `
      <article class="sb-song-card" data-status="${song.status}" data-id="${song.id}">
        <div class="thumbnail">
          <img src="https://img.youtube.com/vi/${videoId}/mqdefault.jpg" alt="${song.title} thumbnail">
          <div class="play-overlay">
            <button class="play-btn" data-video="${videoId}">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
          </div>
          <span class="status-badge ${song.status}">${song.status}</span>
          <div class="difficulty" title="Difficulty: ${song.difficulty}/3">
            ${renderDifficulty(song.difficulty)}
          </div>
        </div>
        <div class="card-body">
          <div class="song-info-compact">
            <h3 class="song-title">${song.title}</h3>
            <div class="song-artist">${song.artist}</div>
          </div>
          <div class="chord-chips">
            ${chordsHtml}
          </div>
          <div class="card-footer">
            <div class="meta-info">
              <span>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                ${song.capo}
              </span>
            </div>
            ${song.status === 'ready' 
              ? `<a href="${song.href}" class="btn-open">Open</a>`
              : `<span style="color: var(--text-muted); font-size: 0.85rem;">Coming soon</span>`
            }
          </div>
        </div>
      </article>
    `;
  }

  // Filter and render songs
  function renderSongs() {
    let filtered = songs;
    
    // Apply status filter
    if (currentFilter !== 'all') {
      filtered = filtered.filter(s => s.status === currentFilter);
    }
    
    // Apply search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(s => 
        s.title.toLowerCase().includes(q) ||
        s.artist.toLowerCase().includes(q) ||
        s.chords.some(c => c.toLowerCase().includes(q))
      );
    }
    
    // Update counts
    const readyCount = songs.filter(s => s.status === 'ready').length;
    const pendingCount = songs.filter(s => s.status === 'pending').length;
    document.getElementById('totalCount').textContent = songs.length;
    document.getElementById('readyCount').textContent = readyCount;
    document.getElementById('pendingCount').textContent = pendingCount;
    
    // Render
    if (filtered.length === 0) {
      songGrid.innerHTML = `
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
          </svg>
          <h3>No songs found</h3>
          <p>Try a different search or filter</p>
        </div>
      `;
    } else {
      songGrid.innerHTML = filtered.map(renderSongCard).join('');
    }
    
    // Apply view class
    songGrid.className = currentView === 'compact' ? 'song-grid compact-view' : 'song-grid';
  }

  // Filter tabs
  filterTabs.forEach(tab => {
    tab.addEventListener('click', function() {
      filterTabs.forEach(t => t.classList.remove('active'));
      this.classList.add('active');
      currentFilter = this.dataset.filter;
      renderSongs();
    });
  });

  // View toggle
  viewBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      viewBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentView = this.dataset.view;
      renderSongs();
    });
  });

  // Search
  searchInput.addEventListener('input', function() {
    searchQuery = this.value;
    renderSongs();
  });

  // Request modal
  document.getElementById('btnRequest').addEventListener('click', function() {
    requestModal.classList.add('open');
  });

  document.getElementById('btnCancelRequest').addEventListener('click', function() {
    requestModal.classList.remove('open');
  });

  requestModal.addEventListener('click', function(e) {
    if (e.target === requestModal) {
      requestModal.classList.remove('open');
    }
  });

  document.getElementById('btnSubmitRequest').addEventListener('click', async function() {
    const title = document.getElementById('reqTitle').value.trim();
    const artist = document.getElementById('reqArtist').value.trim();
    const notes = document.getElementById('reqNotes').value.trim();
    
    if (!title || !artist) {
      alert('Please enter both song title and artist.');
      return;
    }

    // Warn guest users that requests are local-only
    const isGuest = typeof GuitarAuth !== 'undefined' && GuitarAuth.isGuest();
    
    // Attempt to submit via API
    let submitted = false;
    if (window.GuitarAPI && typeof GuitarAPI.requestSong === 'function') {
      try {
        await GuitarAPI.requestSong(title, artist, notes);
        submitted = true;
        console.log('Song request submitted via GuitarAPI');
      } catch (error) {
        console.warn('API submission failed, falling back to localStorage:', error);
      }
    }
    
    // Fallback to localStorage if API unavailable or failed
    if (!submitted) {
      const requests = JSON.parse(localStorage.getItem('songRequests') || '[]');
      requests.push({ title, artist, notes, timestamp: new Date().toISOString() });
      localStorage.setItem('songRequests', JSON.stringify(requests));
    }
    
    // Add to songs array as pending
    const newSong = {
      id: Date.now(),
      title: title,
      artist: artist,
      videoId: 'dQw4w9WgXcQ', // placeholder
      chords: [],
      difficulty: 2,
      status: 'pending',
      capo: 'TBD',
      style: notes || 'Requested',
      href: null
    };
    
    songs.unshift(newSong);
    
    // Reset form and close modal
    document.getElementById('reqTitle').value = '';
    document.getElementById('reqArtist').value = '';
    document.getElementById('reqNotes').value = '';
    requestModal.classList.remove('open');
    
    // Re-render
    renderSongs();
    
    if (isGuest) {
      alert(`"${title}" saved locally. Log in so your teacher can see your request!`);
    } else {
      alert(`"${title}" has been requested! Your teacher will add it soon.`);
    }
  });

  // Mobile sidebar toggle
  document.getElementById('sidebarToggle').addEventListener('click', function() {
    document.getElementById('appSidebar').classList.toggle('open');
  });

  // Initialize songs from API or defaults
  initializeSongs();
</script>

</body>
</html>
