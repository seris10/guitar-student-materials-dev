<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <script src="scripts/api.js"></script>
  <script src="scripts/auth.js"></script>

  <style>
    /* Star Map Page - Full viewport clusters */
    .star-map-page {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .star-map-header {
      position: fixed;
      top: 0;
      left: 264px;
      right: 0;
      padding: 24px 32px;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, var(--bg-primary) 0%, transparent 100%);
    }

    .star-map-title {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(to right, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .star-map-stats {
      display: flex;
      gap: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-value {
      font-weight: 700;
      font-size: 18px;
      color: var(--text-primary);
    }

    /* Cluster Container - Full viewport */
    .clusters-viewport {
      position: relative;
      width: 100%;
      min-height: 100vh;
      padding: 100px 40px 40px 40px;
    }

    /* Individual Cluster */
    .cluster {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .cluster:hover {
      transform: scale(1.08);
    }

    .cluster.locked {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .cluster.locked:hover {
      transform: none;
    }

    /* Cluster Orb */
    .cluster-orb {
      position: relative;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid;
      transition: all 0.3s ease;
      background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.05), transparent 60%);
    }

    .cluster:hover .cluster-orb {
      box-shadow: 0 0 40px currentColor;
    }

    .cluster.active .cluster-orb {
      box-shadow: 0 0 60px currentColor, inset 0 0 40px rgba(255, 255, 255, 0.1);
      animation: pulse-glow 3s ease-in-out infinite;
    }

    .cluster.locked .cluster-orb {
      background: radial-gradient(circle at 30% 30%, rgba(125, 133, 144, 0.2), transparent 60%);
      border-color: rgba(125, 133, 144, 0.3) !important;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 60px currentColor, inset 0 0 40px rgba(255, 255, 255, 0.1); }
      50% { box-shadow: 0 0 80px currentColor, inset 0 0 50px rgba(255, 255, 255, 0.15); }
    }

    /* Stars inside the orb */
    .cluster-stars {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
    }

    .mini-star {
      position: absolute;
      width: 6px;
      height: 6px;
      background: currentColor;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }

    .mini-star.completed {
      opacity: 1;
    }

    .mini-star.locked {
      opacity: 0.3;
      box-shadow: none;
    }

    /* Branch name in center */
    .cluster-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .cluster-icon {
      font-size: 32px;
      opacity: 0.8;
    }

    .cluster.locked .cluster-icon {
      opacity: 0.4;
    }

    /* Cluster label */
    .cluster-label {
      margin-top: 16px;
      text-align: center;
    }

    .cluster-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .cluster.locked .cluster-name {
      color: var(--text-muted);
    }

    .cluster-progress {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .cluster-progress .done {
      color: var(--accent-green);
      font-weight: 600;
    }

    /* Lock icon overlay */
    .cluster-lock {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 40px;
      height: 40px;
      color: var(--text-muted);
      z-index: 3;
    }

    /* Connecting lines between clusters */
    .cluster-connections {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .cluster-connections svg {
      width: 100%;
      height: 100%;
    }

    .connection-line {
      stroke: rgba(88, 166, 255, 0.15);
      stroke-width: 1.5;
      stroke-dasharray: 6 3;
    }

    .connection-line.active {
      stroke: rgba(88, 166, 255, 0.3);
      stroke-dasharray: none;
    }

    /* Legend */
    .star-map-legend {
      position: fixed;
      bottom: 24px;
      left: 264px;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 32px;
      padding: 16px;
      z-index: 50;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .legend-dot.completed { background: var(--accent-green); box-shadow: 0 0 6px var(--accent-green); }
    .legend-dot.in-progress { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .legend-dot.available { background: var(--accent-orange); box-shadow: 0 0 6px var(--accent-orange); }
    .legend-dot.locked { background: var(--text-muted); }

    /* Responsive */
    @media (max-width: 768px) {
      .star-map-header {
        left: 0;
        padding: 16px;
      }

      .star-map-legend {
        left: 0;
        flex-wrap: wrap;
        gap: 16px;
      }

      .cluster-orb {
        width: 120px;
        height: 120px;
      }

      .cluster-name {
        font-size: 14px;
      }
    }
  </style>
</head>

<!-- Star Map Page -->
<div class="star-map-page">

  <!-- Header -->
  <header class="star-map-header">
    <h1 class="star-map-title">Skill Constellations</h1>
    <div class="star-map-stats">
      <div class="stat-item">
        <span class="stat-value" id="masteredCount">0</span>
        <span>skills mastered</span>
      </div>
      <div class="stat-item">
        <span class="stat-value" id="totalCount">0</span>
        <span>total skills</span>
      </div>
    </div>
  </header>

  <!-- Clusters Viewport -->
  <div class="clusters-viewport" id="clustersViewport">

    <!-- Connection Lines SVG -->
    <svg class="cluster-connections" id="connectionsSvg">
      <!-- Lines drawn by JS -->
    </svg>

    <!-- Branches rendered by JavaScript -->

  </div>

  <!-- Legend -->
  <div class="star-map-legend">
    <div class="legend-item">
      <span class="legend-dot completed"></span>
      Completed
    </div>
    <div class="legend-item">
      <span class="legend-dot in-progress"></span>
      In Progress
    </div>
    <div class="legend-item">
      <span class="legend-dot available"></span>
      Available
    </div>
    <div class="legend-item">
      <span class="legend-dot locked"></span>
      Locked
    </div>
  </div>

</div>

<script>
// Branch positioning for constellation layout (2-row organic scatter)
const branchPositions = {
  'foundations': { left: '12%', top: '25%' },
  'right-hand': { left: '25%', top: '15%' },
  'left-hand': { left: '38%', top: '25%' },
  'chords': { left: '52%', top: '20%' },
  'transitions': { left: '65%', top: '30%' },
  'rhythm': { left: '78%', top: '18%' },
  'reading': { left: '18%', top: '70%' },
  'theory': { left: '35%', top: '65%' },
  'single-note': { left: '50%', top: '75%' },
  'songs': { left: '72%', top: '68%' }
};

// Branch relationships for connection lines
const branchConnections = [
  ['foundations', 'right-hand'],
  ['foundations', 'left-hand'],
  ['right-hand', 'chords'],
  ['left-hand', 'chords'],
  ['chords', 'transitions'],
  ['chords', 'rhythm'],
  ['rhythm', 'songs'],
  ['reading', 'theory'],
  ['left-hand', 'single-note'],
  ['transitions', 'songs'],
  ['single-note', 'songs']
];

// Initialize page
function initPage() {
  if (!window.SKILL_DATA) {
    console.error('SKILL_DATA not loaded');
    return;
  }

  const viewport = document.getElementById('clustersViewport');
  const branches = window.SKILL_DATA.branches;

  // Calculate total skills
  const totalSkills = Object.keys(window.SKILL_DATA.skills).length;
  document.getElementById('totalCount').textContent = totalSkills;

  // Render each branch
  branches.forEach(branch => {
    const position = branchPositions[branch.id];
    if (!position) return;

    const cluster = createCluster(branch, position);
    viewport.appendChild(cluster);
  });

  // Draw connections after a small delay to ensure DOM is ready
  setTimeout(drawConnections, 100);
}

function createCluster(branch, position) {
  const cluster = document.createElement('div');
  cluster.className = 'cluster';
  if (branch.id === 'foundations') {
    cluster.classList.add('active');
  }
  cluster.setAttribute('data-branch', branch.id);
  cluster.style.left = position.left;
  cluster.style.top = position.top;

  // Get completed and total count for this branch
  let completedCount = 0;
  let totalCount = 0;

  for (const skillId in window.SKILL_DATA.skills) {
    if (window.SKILL_DATA.skills[skillId].branch === branch.id) {
      totalCount++;
    }
  }

  const orb = document.createElement('div');
  orb.className = 'cluster-orb';
  orb.style.borderColor = branch.color;
  orb.style.color = branch.color;

  // Create stars container
  const starsContainer = document.createElement('div');
  starsContainer.className = 'cluster-stars';

  // Add mini stars (sample 5 skills represented as stars)
  const skillsForBranch = Object.values(window.SKILL_DATA.skills).filter(s => s.branch === branch.id);
  const sampleSkills = skillsForBranch.slice(0, 5);

  sampleSkills.forEach((skill, index) => {
    const star = document.createElement('span');
    star.className = 'mini-star';
    const angle = (index / sampleSkills.length) * Math.PI * 2;
    const radius = 35;
    const x = 50 + radius * Math.cos(angle);
    const y = 50 + radius * Math.sin(angle);
    star.style.left = x + '%';
    star.style.top = y + '%';
    starsContainer.appendChild(star);
  });

  // Add content (icon or star burst pattern)
  const content = document.createElement('div');
  content.className = 'cluster-content';

  const icon = document.createElement('div');
  icon.className = 'cluster-icon';
  icon.textContent = '★';

  content.appendChild(icon);
  orb.appendChild(starsContainer);
  orb.appendChild(content);

  // Create label
  const label = document.createElement('div');
  label.className = 'cluster-label';

  const name = document.createElement('div');
  name.className = 'cluster-name';
  name.textContent = branch.name;

  const progress = document.createElement('div');
  progress.className = 'cluster-progress';
  progress.innerHTML = `<span class="done">${completedCount}</span> / ${totalCount} skills`;

  label.appendChild(name);
  label.appendChild(progress);

  cluster.appendChild(orb);
  cluster.appendChild(label);

  // Add click handler
  cluster.addEventListener('click', () => {
    window.location.href = `constellation.html?branch=${branch.id}`;
  });

  return cluster;
}

function drawConnections() {
  const svg = document.getElementById('connectionsSvg');
  const viewport = document.getElementById('clustersViewport');
  svg.innerHTML = '';

  branchConnections.forEach(([fromBranchId, toBranchId]) => {
    const fromCluster = document.querySelector(`.cluster[data-branch="${fromBranchId}"]`);
    const toCluster = document.querySelector(`.cluster[data-branch="${toBranchId}"]`);

    if (!fromCluster || !toCluster) return;

    const fromRect = fromCluster.getBoundingClientRect();
    const toRect = toCluster.getBoundingClientRect();
    const vpRect = viewport.getBoundingClientRect();

    const x1 = fromRect.left + fromRect.width / 2 - vpRect.left;
    const y1 = fromRect.top + fromRect.height / 2 - vpRect.top;
    const x2 = toRect.left + toRect.width / 2 - vpRect.left;
    const y2 = toRect.top + toRect.height / 2 - vpRect.top;

    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1);
    line.setAttribute('y1', y1);
    line.setAttribute('x2', x2);
    line.setAttribute('y2', y2);
    line.classList.add('connection-line');

    // Both branches are active if they're available (not locked)
    if (!fromCluster.classList.contains('locked') && !toCluster.classList.contains('locked')) {
      line.classList.add('active');
    }

    svg.appendChild(line);
  });
}

// Mobile sidebar toggle
const sidebarToggle = document.getElementById('sidebarToggle');
const appSidebar = document.getElementById('appSidebar');

if (sidebarToggle && appSidebar) {
  sidebarToggle.addEventListener('click', () => {
    appSidebar.classList.toggle('open');
    document.body.classList.toggle('sidebar-open');
  });

  document.addEventListener('click', (e) => {
    if (appSidebar.classList.contains('open') &&
        !appSidebar.contains(e.target) &&
        !sidebarToggle.contains(e.target)) {
      appSidebar.classList.remove('open');
      document.body.classList.remove('sidebar-open');
    }
  });
}

// Initialize on page load
window.addEventListener('load', initPage);
window.addEventListener('resize', drawConnections);
</script>
</body>
