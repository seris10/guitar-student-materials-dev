<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Branch 1: Guitar Foundations</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body, #root { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; }
  *, *::before, *::after { box-sizing: border-box; }
  @keyframes pulse-slow {
    0%, 100% { opacity: 0.3; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.1); }
  }
  .animate-pulse-slow { animation: pulse-slow 5s ease-in-out infinite; }
  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  .animate-spin-slow { animation: spin-slow 20s linear infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

// Branch 1: Guitar Foundations
const SKILL_DATA = [
  // 1.1 Know Your Instrument
  {
    id: 'FOUND-001',
    label: 'Parts of the Guitar',
    x: 50, y: 85, status: 'completed', type: 'master', color: 'blue'
  },
  {
    id: 'FOUND-002',
    label: 'String Names (EADGBE)',
    x: 30, y: 70, status: 'completed', type: 'minor', color: 'cyan',
    connections: ['FOUND-001']
  },
  {
    id: 'FOUND-003',
    label: 'Fret Numbers & Markers',
    x: 50, y: 68, status: 'completed', type: 'minor', color: 'cyan',
    connections: ['FOUND-001']
  },
  {
    id: 'FOUND-004',
    label: 'Guitar Types (Acoustic vs Electric)',
    x: 70, y: 70, status: 'available', type: 'minor', color: 'orange',
    connections: ['FOUND-001']
  },

  // 1.2 Holding & Posture
  {
    id: 'POST-001',
    label: 'Seated Position (casual)',
    x: 15, y: 55, status: 'completed', type: 'major', color: 'cyan',
    connections: ['FOUND-001']
  },
  {
    id: 'POST-002',
    label: 'Seated Position (classical)',
    x: 8, y: 40, status: 'available', type: 'minor', color: 'orange',
    connections: ['POST-001']
  },
  {
    id: 'POST-003',
    label: 'Standing with Strap',
    x: 18, y: 38, status: 'locked', type: 'minor', color: 'red',
    connections: ['POST-001']
  },
  {
    id: 'POST-004',
    label: 'Arm & Wrist Relaxation',
    x: 28, y: 42, status: 'available', type: 'minor', color: 'orange',
    connections: ['POST-001']
  },
  {
    id: 'POST-005',
    label: 'Thumb Position (back of neck)',
    x: 12, y: 25, status: 'locked', type: 'minor', color: 'red',
    connections: ['POST-001']
  },

  // 1.3 Basic Care & Maintenance
  {
    id: 'CARE-001',
    label: 'Using a Tuner App',
    x: 35, y: 52, status: 'completed', type: 'minor', color: 'cyan',
    connections: ['FOUND-002']
  },
  {
    id: 'CARE-002',
    label: 'Tuning by Ear (reference pitch)',
    x: 42, y: 35, status: 'locked', type: 'major', color: 'red',
    connections: ['CARE-001']
  },
  {
    id: 'CARE-003',
    label: 'Wiping Down Strings',
    x: 75, y: 55, status: 'available', type: 'minor', color: 'orange',
    connections: ['FOUND-001']
  },
  {
    id: 'CARE-004',
    label: 'Proper Storage',
    x: 88, y: 58, status: 'available', type: 'minor', color: 'orange',
    connections: ['FOUND-001']
  },
  {
    id: 'CARE-005',
    label: 'When Strings Need Changing',
    x: 82, y: 40, status: 'locked', type: 'minor', color: 'red',
    connections: ['CARE-003']
  }
];

const getStarStyles = (colorName, status) => {
  if (status === 'locked') return {
    glowColor: 'from-red-900',
    spikeColor: 'via-red-800',
    coreColor: 'bg-red-950',
    beamColor: 'stroke-red-900/30'
  };
  switch (colorName) {
    case 'blue': return {
      glowColor: 'from-blue-400',
      spikeColor: 'via-blue-200',
      coreColor: 'bg-blue-100',
      beamColor: 'stroke-blue-400'
    };
    case 'cyan': return {
      glowColor: 'from-cyan-300',
      spikeColor: 'via-cyan-100',
      coreColor: 'bg-cyan-50',
      beamColor: 'stroke-cyan-400'
    };
    case 'purple': return {
      glowColor: 'from-fuchsia-400',
      spikeColor: 'via-fuchsia-200',
      coreColor: 'bg-fuchsia-100',
      beamColor: 'stroke-fuchsia-400'
    };
    case 'orange':
    default: return {
      glowColor: 'from-amber-400',
      spikeColor: 'via-amber-100',
      coreColor: 'bg-amber-50',
      beamColor: 'stroke-amber-400'
    };
  }
};

const StarNode = ({ node, onClick, isSelected, showName }) => {
  const s = getStarStyles(node.color, node.status);
  const isMaster = node.type === 'master';
  const isMajor = node.type === 'major';
  const isLocked = node.status === 'locked';
  const baseScale = isMaster ? 1.8 : isMajor ? 1.3 : 0.9;

  return (
    <div
      className="absolute cursor-pointer group z-20 transition-transform duration-500 ease-out"
      style={{
        left: `${node.x}%`,
        top: `${node.y}%`,
        transform: `translate(-50%, -50%) scale(${isSelected ? 1.2 : 1})`
      }}
      onClick={() => onClick(node)}
    >
      <div className={`absolute -top-12 left-1/2 -translate-x-1/2 w-64 text-center pointer-events-none transition-opacity duration-300 ${showName ? 'opacity-100' : 'opacity-0 group-hover:opacity-100'}`}>
        <span className={`text-xs font-light tracking-wide ${isLocked ? 'text-red-400/50' : 'text-white/70'}`}>
          {node.label}
        </span>
      </div>

      <div className="relative flex items-center justify-center mix-blend-screen" style={{ opacity: isLocked ? 0.5 : 1 }}>
        <div className={`absolute w-96 h-96 rounded-full bg-radial ${s.glowColor} to-transparent blur-3xl opacity-30 pointer-events-none`} />
        <div className={`absolute w-64 h-64 rounded-full bg-radial ${s.glowColor} to-transparent blur-3xl opacity-60 animate-pulse-slow`} />
        <div className={`absolute w-32 h-32 rounded-full bg-radial ${s.glowColor} to-transparent blur-2xl opacity-90`} />

        <div className={`absolute w-[3px] h-48 bg-gradient-to-b from-transparent ${s.spikeColor} via-white to-transparent opacity-100 blur-[1px] transition-all duration-300 group-hover:h-56 group-hover:w-[4px]`} />
        <div className={`absolute h-[3px] w-48 bg-gradient-to-r from-transparent ${s.spikeColor} via-white to-transparent opacity-100 blur-[1px] transition-all duration-300 group-hover:w-56 group-hover:h-[4px]`} />

        {(isMajor || isMaster) && (
          <>
            <div className={`absolute w-[2px] h-32 bg-gradient-to-b from-transparent ${s.spikeColor} to-transparent opacity-80 rotate-45 blur-[1px]`} />
            <div className={`absolute w-[2px] h-32 bg-gradient-to-b from-transparent ${s.spikeColor} to-transparent opacity-80 -rotate-45 blur-[1px]`} />
          </>
        )}

        {isMaster && (
          <>
            <div className={`absolute w-[1px] h-20 bg-gradient-to-b from-transparent ${s.spikeColor} to-transparent opacity-60 rotate-12 blur-[0.5px]`} />
            <div className={`absolute w-[1px] h-20 bg-gradient-to-b from-transparent ${s.spikeColor} to-transparent opacity-60 -rotate-12 blur-[0.5px]`} />
          </>
        )}

        <div
          className="relative z-10 w-3 h-3 rounded-full bg-white transition-transform duration-300 group-hover:scale-125"
          style={{ boxShadow: '0 0 30px 10px rgba(255,255,255,1)', transform: `scale(${baseScale})` }}
        />

        {isMaster && (
          <div className="absolute w-24 h-24 border border-white/10 rounded-full blur-[1px] opacity-20 group-hover:scale-110 transition-transform duration-1000" />
        )}
      </div>

      {isSelected && (
        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 pointer-events-none">
          <svg className="w-full h-full animate-spin-slow opacity-80" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="none" stroke="white" strokeWidth="0.5" strokeDasharray="10 20" />
          </svg>
        </div>
      )}
    </div>
  );
};

const ConstellationLines = ({ nodes }) => (
  <svg className="absolute inset-0 w-full h-full pointer-events-none z-0 overflow-visible mix-blend-screen">
    <defs>
      <linearGradient id="line-gradient-active" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stopColor="rgba(255,255,255,0)" />
        <stop offset="20%" stopColor="rgba(255,255,255,0.4)" />
        <stop offset="50%" stopColor="rgba(255,255,255,0.8)" />
        <stop offset="80%" stopColor="rgba(255,255,255,0.4)" />
        <stop offset="100%" stopColor="rgba(255,255,255,0)" />
      </linearGradient>
    </defs>
    {nodes.map(node => {
      if (!node.connections) return null;
      return node.connections.map(targetId => {
        const target = nodes.find(n => n.id === targetId);
        if (!target) return null;
        const isActive = node.status !== 'locked' && target.status !== 'locked';
        return (
          <line
            key={`${node.id}-${targetId}`}
            x1={`${node.x}%`} y1={`${node.y}%`}
            x2={`${target.x}%`} y2={`${target.y}%`}
            stroke={isActive ? "url(#line-gradient-active)" : "rgba(255,255,255,0.05)"}
            strokeWidth={isActive ? 1 : 0.5}
            className="transition-all duration-1000"
          />
        );
      });
    })}
  </svg>
);

function App() {
  const [selectedNode, setSelectedNode] = useState(SKILL_DATA[0]);
  const [cameraPosition, setCameraPosition] = useState({ x: 0, y: 0 });
  const [showAllNames, setShowAllNames] = useState(true);

  const handleMouseMove = (e) => {
    const moveX = (e.clientX - window.innerWidth / 2) * 0.03;
    const moveY = (e.clientY - window.innerHeight / 2) * 0.03;
    setCameraPosition({ x: moveX, y: moveY });
  };

  return (
    <div
      className="relative w-full h-screen bg-black overflow-hidden text-slate-300 font-sans selection:bg-cyan-500/30"
      onMouseMove={handleMouseMove}
    >
      <div
        className="absolute inset-0 transition-transform duration-100 ease-out"
        style={{ transform: `translate(${-cameraPosition.x * 0.5}px, ${-cameraPosition.y * 0.5}px) scale(1.05)` }}
      >
        <div className="absolute inset-0 bg-black" />
        <div className="absolute top-[-20%] left-[-10%] w-[80%] h-[80%] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-indigo-900/30 via-black to-black blur-[100px] opacity-60" />
        <div className="absolute bottom-[-20%] right-[-10%] w-[80%] h-[80%] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-fuchsia-900/20 via-black to-black blur-[100px] opacity-60" />
        <div className="absolute top-[40%] left-[60%] w-[40%] h-[40%] bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-amber-900/20 via-black to-black blur-[80px] opacity-40" />
        <div className="absolute inset-0 opacity-40 mix-blend-screen" style={{ backgroundImage: 'radial-gradient(rgba(255,255,255,0.8) 1px, transparent 1px)', backgroundSize: '100px 100px' }} />
        <div className="absolute inset-0 opacity-20 mix-blend-screen" style={{ backgroundImage: 'radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px)', backgroundSize: '40px 40px' }} />
      </div>

      <div className="absolute top-0 left-0 w-full p-8 z-50 flex justify-between items-start pointer-events-none">
        <div className="flex items-center gap-6">
          <a href="index.html" className="pointer-events-auto group flex items-center gap-2 text-white/40 hover:text-white/80 transition-all duration-300">
            <svg className="w-4 h-4 group-hover:-translate-x-1 transition-transform" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            <span className="text-xs tracking-widest uppercase font-light">Home</span>
          </a>
          <h1 className="text-4xl font-thin tracking-[0.3em] text-transparent bg-clip-text bg-gradient-to-b from-white to-white/50 drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">
            FOUNDATIONS
          </h1>
        </div>
        <div className="flex items-center gap-4 pointer-events-auto">
          <button
            onClick={() => setShowAllNames(!showAllNames)}
            className={`bg-white/5 backdrop-blur-md border border-white/10 px-4 py-2 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.05)] transition-all hover:bg-white/10 ${showAllNames ? 'text-cyan-100/80' : 'text-white/40'}`}
          >
            <span className="text-xs tracking-widest uppercase">{showAllNames ? 'Labels On' : 'Labels Off'}</span>
          </button>
          <div className="bg-white/5 backdrop-blur-md border border-white/10 px-6 py-2 rounded-full shadow-[0_0_15px_rgba(255,255,255,0.05)]">
            <span className="text-xs tracking-widest uppercase text-cyan-100/80">Branch 1 of 6</span>
          </div>
        </div>
      </div>

      <div
        className="absolute inset-0 transition-transform duration-700 ease-out z-10"
        style={{ transform: `translate(${cameraPosition.x}px, ${cameraPosition.y}px)` }}
      >
        <ConstellationLines nodes={SKILL_DATA} />
        {SKILL_DATA.map(node => (
          <StarNode
            key={node.id}
            node={node}
            isSelected={selectedNode?.id === node.id}
            onClick={setSelectedNode}
            showName={showAllNames}
          />
        ))}
      </div>

      <div className={`absolute bottom-0 left-0 w-full h-1/3 bg-gradient-to-t from-black via-black/80 to-transparent pointer-events-none z-30 transition-opacity duration-500 ${selectedNode ? 'opacity-100' : 'opacity-0'}`} />

      <div className={`absolute bottom-12 left-0 w-full flex justify-center z-40 transition-all duration-500 ${selectedNode ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
        <div className="max-w-xl w-full text-center px-4">
          <div className="flex justify-center gap-4 pointer-events-auto">
            {selectedNode?.status === 'locked' ? (
              <button className="px-8 py-3 border border-red-900/30 bg-red-950/30 text-red-500/50 uppercase tracking-[0.2em] text-xs cursor-not-allowed backdrop-blur-sm">
                Locked
              </button>
            ) : selectedNode?.status === 'completed' ? (
              <button className="px-10 py-3 bg-gradient-to-r from-cyan-900/20 to-blue-900/20 text-cyan-200 uppercase tracking-[0.2em] text-xs backdrop-blur-sm border border-cyan-500/30 shadow-[0_0_20px_rgba(6,182,212,0.1)]">
                Mastered
              </button>
            ) : (
              <button className="group/btn relative px-12 py-3 bg-transparent overflow-hidden border border-white/20 transition-all hover:border-white/50">
                <div className="absolute inset-0 bg-white/5 translate-y-full group-hover/btn:translate-y-0 transition-transform duration-300" />
                <span className="relative z-10 text-white uppercase tracking-[0.2em] text-xs font-semibold drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]">
                  Unlock
                </span>
              </button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
