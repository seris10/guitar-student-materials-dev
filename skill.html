<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guitar Skill Lesson - Guitar Club</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <script src="scripts/api.js"></script>
  <script src="scripts/auth.js"></script>
  <script src="scripts/skill-data.js"></script>
  
  <style>
    /* ============================================
       SKILL PAGE: Dynamic lesson template
       ============================================ */

    /* Layout wrapper */
    .skill-page {
      min-height: 100vh;
      padding: 24px 32px 60px;
    }

    /* Header with back button and title */
    .skill-page-header {
      display: flex;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
      flex-shrink: 0;
      cursor: pointer;
    }

    .back-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    .skill-header-content {
      flex: 1;
    }

    .skill-breadcrumb {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .skill-breadcrumb a {
      color: var(--text-secondary);
      text-decoration: none;
    }

    .skill-breadcrumb a:hover {
      color: var(--accent);
    }

    .skill-title {
      font-size: 32px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .skill-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      font-size: 14px;
    }

    .skill-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
    }

    .skill-meta-item svg {
      width: 16px;
      height: 16px;
    }

    .branch-tag {
      padding: 6px 12px;
      background: rgba(167, 139, 250, 0.15);
      border: 1px solid rgba(167, 139, 250, 0.3);
      border-radius: 12px;
      font-size: 13px;
      color: #a78bfa;
      font-weight: 500;
    }

    .branch-tag[data-branch="foundations"] {
      background: rgba(34, 211, 238, 0.15);
      border-color: rgba(34, 211, 238, 0.3);
      color: #22d3ee;
    }

    .branch-tag[data-branch="right-hand"] {
      background: rgba(52, 211, 153, 0.15);
      border-color: rgba(52, 211, 153, 0.3);
      color: #34d399;
    }

    .branch-tag[data-branch="left-hand"] {
      background: rgba(251, 191, 36, 0.15);
      border-color: rgba(251, 191, 36, 0.3);
      color: #fbbf24;
    }

    .branch-tag[data-branch="chords"] {
      background: rgba(167, 139, 250, 0.15);
      border-color: rgba(167, 139, 250, 0.3);
      color: #a78bfa;
    }

    .branch-tag[data-branch="transitions"] {
      background: rgba(240, 171, 252, 0.15);
      border-color: rgba(240, 171, 252, 0.3);
      color: #f0abfc;
    }

    .branch-tag[data-branch="rhythm"] {
      background: rgba(251, 113, 133, 0.15);
      border-color: rgba(251, 113, 133, 0.3);
      color: #fb7185;
    }

    .branch-tag[data-branch="reading"] {
      background: rgba(16, 185, 129, 0.15);
      border-color: rgba(16, 185, 129, 0.3);
      color: #10b981;
    }

    .branch-tag[data-branch="theory"] {
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.3);
      color: #f59e0b;
    }

    .branch-tag[data-branch="single-note"] {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.3);
      color: #8b5cf6;
    }

    .branch-tag[data-branch="songs"] {
      background: rgba(236, 72, 153, 0.15);
      border-color: rgba(236, 72, 153, 0.3);
      color: #ec4899;
    }

    .difficulty-dots {
      display: flex;
      gap: 4px;
    }

    .difficulty-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-orange);
      opacity: 0.4;
    }

    .difficulty-dot.filled {
      opacity: 1;
    }

    /* Content grid: main + sidebar */
    .skill-content {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 32px;
      max-width: 1200px;
    }

    .skill-main {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }

    .skill-sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Section card styling */
    .skill-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .section-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-header svg {
      width: 18px;
      height: 18px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .section-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin: 0;
    }

    .section-body {
      padding: 20px;
    }

    /* Description section */
    .skill-description {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .skill-description p {
      margin-bottom: 16px;
    }

    .skill-description p:last-child {
      margin-bottom: 0;
    }

    .skill-description strong {
      color: var(--text-primary);
    }

    /* "What you'll learn" bullets */
    .learning-outcomes {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .learning-outcomes h3 {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .learning-outcomes ul {
      list-style: none;
      padding-left: 0;
    }

    .learning-outcomes li {
      margin-bottom: 8px;
      padding-left: 24px;
      position: relative;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .learning-outcomes li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 600;
    }

    /* Video section */
    .video-wrapper {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .video-placeholder svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .video-placeholder:hover {
      background: var(--bg-secondary);
    }

    .video-placeholder:hover svg {
      opacity: 0.8;
    }

    .video-caption {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
      font-style: italic;
    }

    .external-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .external-link-btn:hover {
      background: var(--bg-secondary);
      border-color: var(--accent);
    }

    .external-link-btn svg {
      width: 16px;
      height: 16px;
    }

    /* Practice exercise section */
    .practice-prompt {
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      border-left: 3px solid var(--accent-green);
      font-size: 15px;
      line-height: 1.6;
      color: var(--text-primary);
    }

    /* Practice steps list */
    .practice-steps {
      counter-reset: step;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .practice-step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-secondary);
    }

    .step-number {
      counter-increment: step;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* Quiz section */
    .quiz-intro {
      margin-bottom: 20px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .quiz-question {
      margin-bottom: 24px;
    }

    .quiz-question:last-child {
      margin-bottom: 0;
    }

    .question-text {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .question-number {
      color: var(--accent);
      margin-right: 8px;
    }

    .quiz-options {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .quiz-option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quiz-option:hover {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.05);
    }

    .quiz-option.selected {
      border-color: var(--accent);
      background: rgba(88, 166, 255, 0.1);
    }

    .quiz-option.correct {
      border-color: var(--accent-green);
      background: rgba(63, 185, 80, 0.1);
    }

    .quiz-option.incorrect {
      border-color: #f85149;
      background: rgba(248, 81, 73, 0.1);
    }

    .option-radio {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quiz-option.selected .option-radio {
      border-color: var(--accent);
    }

    .quiz-option.selected .option-radio::after {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    .quiz-option.correct .option-radio {
      border-color: var(--accent-green);
      background: var(--accent-green);
    }

    .quiz-option.correct .option-radio::after {
      content: '\2713';
      color: #000;
      font-size: 12px;
      font-weight: 700;
    }

    .option-text {
      font-size: 14px;
      color: var(--text-primary);
    }

    .quiz-feedback {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .quiz-feedback.show {
      display: block;
    }

    .quiz-feedback.correct-feedback {
      background: rgba(63, 185, 80, 0.1);
      border: 1px solid var(--accent-green);
      color: var(--accent-green);
    }

    .quiz-feedback.incorrect-feedback {
      background: rgba(248, 81, 73, 0.1);
      border: 1px solid #f85149;
      color: #f85149;
    }

    .quiz-actions {
      margin-top: 24px;
      display: flex;
      gap: 12px;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    .btn-primary:disabled {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }

    .btn-secondary:hover {
      border-color: var(--accent);
    }

    /* Knowledge check placeholder */
    .knowledge-placeholder {
      padding: 24px;
      text-align: center;
      color: var(--text-muted);
    }

    .knowledge-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.3;
      margin-bottom: 12px;
    }

    /* Sidebar cards */
    .progress-card {
      text-align: center;
      padding: 20px;
    }

    .progress-level {
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .progress-label {
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    .mastery-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .mastery-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
    }

    .mastery-dot.active {
      background: var(--accent-green);
      border-color: var(--accent-green);
    }

    .action-btn {
      width: 100%;
      padding: 12px 16px;
      margin-top: 16px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .action-btn:hover {
      filter: brightness(1.1);
    }

    .action-btn:disabled {
      background: var(--bg-tertiary);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    /* Prerequisites list */
    .prereq-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prereq-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
    }

    .prereq-item:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .prereq-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: 600;
    }

    .prereq-icon.completed {
      background: var(--accent-green);
      color: #000;
    }

    .prereq-icon.locked {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    .no-prereqs {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      padding: 10px 0;
    }

    /* Next skills section */
    .next-skill-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: all 0.2s;
    }

    .next-skill-item:hover {
      background: var(--bg-secondary);
      color: var(--accent);
    }

    .next-skill-item svg {
      width: 16px;
      height: 16px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .no-next-skills {
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      padding: 10px 0;
    }

    /* Error state */
    .error-container {
      padding: 40px 24px;
      text-align: center;
    }

    .error-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      opacity: 0.3;
    }

    .error-title {
      font-size: 24px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .error-message {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }

    .error-link {
      display: inline-block;
      padding: 10px 20px;
      background: var(--accent);
      color: #000;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }

    .error-link:hover {
      filter: brightness(1.1);
    }

    /* Responsive */
    @media (max-width: 900px) {
      .skill-content {
        grid-template-columns: 1fr;
      }

      .skill-sidebar {
        order: -1;
      }
    }

    @media (max-width: 768px) {
      .skill-page {
        padding: 16px;
      }

      .skill-page-header {
        flex-direction: column;
        gap: 16px;
      }

      .skill-title {
        font-size: 24px;
      }

      .skill-meta {
        flex-direction: column;
        gap: 8px;
      }
    }
  </style>
</head>

<div class="skill-page" id="skillPage">

  <!-- Header Section -->

      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </a>
    <div class="skill-header-content">
      <div class="skill-breadcrumb" id="breadcrumb"></div>
      <h1 class="skill-title" id="skillTitle"></h1>
      <div class="skill-meta" id="skillMeta"></div>
    </div>
  </header>

  <!-- Content Grid -->
  <div class="skill-content" id="skillContent">
    <!-- Main content will be populated here -->
  </div>

</div>

<script>
  // ============================================
  // SKILL PAGE: Dynamic skill lesson loader
  // ============================================

  document.addEventListener('DOMContentLoaded', function() {
    initSkillPage();
  });

  function initSkillPage() {
    // Get skill ID from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const skillId = urlParams.get('id');

    if (!skillId) {
      showError('No skill ID provided', 'Please visit the skill page with a valid skill ID parameter.');
      return;
    }

    // Look up skill in SKILL_DATA
    if (!window.SKILL_DATA || !window.SKILL_DATA.skills) {
      showError('Skill data not found', 'Unable to load skill database.');
      return;
    }

    const skill = window.SKILL_DATA.skills[skillId];
    if (!skill) {
      showError('Skill not found', `Unable to find skill with ID: ${skillId}`);
      return;
    }

    // Populate page with skill data
    populateSkillPage(skill);
    
    // Load progress data for sidebar
    loadProgressData(skillId);
  }

  function populateSkillPage(skill) {
    // Update back button
    document.getElementById('backBtn').href = 'constellation.html';

    // Get branch info
    const branchInfo = window.SKILL_DATA.branches.find(b => b.id === skill.branch);
    const branchName = branchInfo ? branchInfo.name : 'Unknown Branch';

    // Breadcrumb
    const breadcrumb = document.getElementById('breadcrumb');
    breadcrumb.innerHTML = `
      <a href="constellation.html">Constellation</a> /
      ${skill.name}
    `;

    // Title
    document.getElementById('skillTitle').textContent = skill.name;

    // Meta information
    const metaDiv = document.getElementById('skillMeta');
    metaDiv.innerHTML = `
      <span class="branch-tag" data-branch="${skill.branch}">🎸 ${branchName}</span>
      <span class="skill-meta-item">
        <span class="difficulty-dots" id="difficultyDots"></span>
        ${skill.difficulty === 1 ? 'Beginner' : skill.difficulty === 2 ? 'Intermediate' : skill.difficulty === 3 ? 'Advanced' : 'Expert'}
      </span>
      <span class="skill-meta-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        ~${Math.max(5, skill.difficulty * 5)} min
      </span>
    `;

    // Populate difficulty dots
    const dotsContainer = document.getElementById('difficultyDots');
    for (let i = 1; i <= 4; i++) {
      const dot = document.createElement('div');
      dot.className = 'difficulty-dot' + (i <= skill.difficulty ? ' filled' : '');
      dotsContainer.appendChild(dot);
    }

    // Create main content area
    const contentDiv = document.getElementById('skillContent');

    // Determine content: use enriched fields if available, fall back to basics
    const hasEnrichedContent = !!skill.detailedContent;
    const hasQuiz = skill.quiz && skill.quiz.length > 0;
    const hasPracticeSteps = skill.practiceSteps && skill.practiceSteps.length > 0;
    const hasLearningOutcomes = skill.learningOutcomes && skill.learningOutcomes.length > 0;

    // Overview content
    const overviewHTML = hasEnrichedContent
      ? skill.detailedContent
      : `<p>${skill.description}</p>`;

    // Learning outcomes
    const outcomesHTML = hasLearningOutcomes
      ? `<div class="learning-outcomes">
          <h3>What You'll Learn</h3>
          <ul>${skill.learningOutcomes.map(o => `<li>${o}</li>`).join('')}</ul>
        </div>`
      : `<div class="learning-outcomes">
          <h3>What You'll Learn</h3>
          <ul>
            <li>Master <strong>${skill.name}</strong> — the foundation of this skill</li>
            ${getUnlocksText(skill).split('\u2022').filter(t => t.trim()).map(t => `<li>${t.trim()}</li>`).join('')}
          </ul>
        </div>`;

    // Practice section
    const practiceHTML = hasPracticeSteps
      ? `<div class="practice-steps">
          ${skill.practiceSteps.map((step, i) => `
            <div class="practice-step">
              <span class="step-number">${i + 1}</span>
              <span>${step}</span>
            </div>`).join('')}
        </div>`
      : `<div class="practice-prompt">${getPracticePrompt(skill)}</div>`;

    // Quiz section
    const quizHTML = hasQuiz
      ? `<p class="quiz-intro">Test your understanding with these quick questions:</p>
        ${skill.quiz.map((q, i) => `
          <div class="quiz-question" data-question="${i}" data-answer="${q.answer}" data-explanation="${q.explanation || ''}">
            <p class="question-text"><span class="question-number">${i + 1}.</span> ${q.question}</p>
            <div class="quiz-options">
              ${q.options.map((opt, j) => `
                <div class="quiz-option" data-value="${j}">
                  <span class="option-radio"></span>
                  <span class="option-text">${opt}</span>
                </div>`).join('')}
            </div>
            <div class="quiz-feedback"></div>
          </div>`).join('')}
        <div class="quiz-actions">
          <button class="btn btn-primary" id="checkAnswers">Check Answers</button>
          <button class="btn btn-secondary" id="resetQuiz">Reset</button>
        </div>`
      : `<div class="knowledge-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <p>Knowledge check coming soon!</p>
          <p style="font-size: 13px; color: var(--text-muted); margin-top: 8px;">Quiz questions will be added soon to help you test your understanding.</p>
        </div>`;

    contentDiv.innerHTML = `
      <!-- Main content column -->
      <div class="skill-main">
        <!-- Overview Section -->
        <section class="skill-section">
          <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
            <h2>Overview</h2>
          </div>
          <div class="section-body">
            <div class="skill-description">
              ${overviewHTML}
              ${outcomesHTML}
            </div>
          </div>
        </section>

        <!-- Video Section -->
        <section class="skill-section">
          <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"/>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
            </svg>
            <h2>Video Lesson</h2>
          </div>
          <div class="section-body">
            ${getVideoContent(skill)}
          </div>
        </section>

        <!-- Practice Exercise Section -->
        <section class="skill-section">
          <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14.752 11.168l-3.197-2.132A1 1 0 0 0 10 9.87v4.263a1 1 0 0 0 1.555.832l3.197-2.132a1 1 0 0 0 0-1.664z"/>
              <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
            </svg>
            <h2>Practice Exercise</h2>
          </div>
          <div class="section-body">
            ${practiceHTML}
          </div>
        </section>

        <!-- Knowledge Check Section -->
        <section class="skill-section">
          <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
              <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
            <h2>Knowledge Check</h2>
          </div>
          <div class="section-body">
            ${quizHTML}
          </div>
        </section>
      </div>

      <!-- Sidebar -->
      <aside class="skill-sidebar">
        <!-- Progress Card -->
        <div class="skill-section">
          <div class="section-body progress-card">
            <div class="progress-label">Mastery Level</div>
            <div class="progress-level" id="masteryLevel">0</div>
            <div class="mastery-dots" id="masteryDots"></div>
            <button class="action-btn" id="markCompleteBtn">Mark as Complete</button>
          </div>
        </div>

        <!-- Prerequisites -->
        <div class="skill-section">
          <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 11 12 14 22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
            <h2>Prerequisites</h2>
          </div>
          <div class="section-body" id="prerequisitesSection">
            <!-- Populated by JavaScript -->
          </div>
        </div>

        <!-- Unlocks -->
        <div class="skill-section">
          <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            <h2>Unlocks</h2>
          </div>
          <div class="section-body" id="unlocksSection">
            <!-- Populated by JavaScript -->
          </div>
        </div>

        <!-- Songs Section (placeholder) -->
        <div class="skill-section">
          <div class="section-header">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18V5l12-2v13"/>
              <circle cx="6" cy="18" r="3"/>
              <circle cx="18" cy="16" r="3"/>
            </svg>
            <h2>Used in Songs</h2>
          </div>
          <div class="section-body">
            <p class="no-prereqs">Song examples coming soon!</p>
          </div>
        </div>
      </aside>
    `;

    // Populate prerequisites
    const prereqSection = document.getElementById('prerequisitesSection');
    if (skill.prerequisites && skill.prerequisites.length > 0) {
      const prereqList = document.createElement('div');
      prereqList.className = 'prereq-list';
      
      skill.prerequisites.forEach(prereqId => {
        const prereqSkill = window.SKILL_DATA.skills[prereqId];
        if (prereqSkill) {
          const item = document.createElement('a');
          item.href = `skill.html?id=${prereqId}`;
          item.className = 'prereq-item';
          item.innerHTML = `
            <span class="prereq-icon locked">✓</span>
            <span>${prereqSkill.name}</span>
          `;
          prereqList.appendChild(item);
        }
      });
      
      prereqSection.appendChild(prereqList);
    } else {
      prereqSection.innerHTML = '<p class="no-prereqs">This is a gateway skill — no prerequisites required!</p>';
    }

    // Populate unlocks (skills that have this skill as prerequisite)
    const unlocksSection = document.getElementById('unlocksSection');
    const unlockedSkills = Object.values(window.SKILL_DATA.skills).filter(s => 
      s.prerequisites && s.prerequisites.includes(skill.id)
    );

    if (unlockedSkills.length > 0) {
      const unlocksList = document.createElement('div');
      unlocksList.className = 'prereq-list';
      
      unlockedSkills.slice(0, 5).forEach(unlockedSkill => {
        const item = document.createElement('a');
        item.href = `skill.html?id=${unlockedSkill.id}`;
        item.className = 'next-skill-item';
        item.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span>${unlockedSkill.name}</span>
        `;
        unlocksList.appendChild(item);
      });
      
      unlocksSection.appendChild(unlocksList);
    } else {
      unlocksSection.innerHTML = '<p class="no-next-skills">Continue learning to unlock more skills!</p>';
    }

    // Set up mark complete button
    document.getElementById('markCompleteBtn').addEventListener('click', function() {
      markSkillComplete(skill.id);
    });

    // Set up quiz interactivity (if quiz exists)
    initQuiz();
  }

  function initQuiz() {
    // Option selection
    document.querySelectorAll('.quiz-option').forEach(option => {
      option.addEventListener('click', function() {
        const question = this.closest('.quiz-question');
        question.querySelectorAll('.quiz-option').forEach(opt => {
          opt.classList.remove('selected', 'correct', 'incorrect');
        });
        this.classList.add('selected');
        question.querySelector('.quiz-feedback').classList.remove('show', 'correct-feedback', 'incorrect-feedback');
      });
    });

    // Check answers button
    const checkBtn = document.getElementById('checkAnswers');
    if (checkBtn) {
      checkBtn.addEventListener('click', function() {
        document.querySelectorAll('.quiz-question').forEach(question => {
          const correctIdx = parseInt(question.dataset.answer);
          const explanation = question.dataset.explanation;
          const selected = question.querySelector('.quiz-option.selected');
          const feedback = question.querySelector('.quiz-feedback');

          if (selected) {
            const selectedIdx = parseInt(selected.dataset.value);
            const isCorrect = selectedIdx === correctIdx;
            selected.classList.add(isCorrect ? 'correct' : 'incorrect');

            if (!isCorrect) {
              question.querySelector(`.quiz-option[data-value="${correctIdx}"]`).classList.add('correct');
            }

            const feedbackText = isCorrect
              ? `Correct!${explanation ? ' ' + explanation : ''}`
              : `Not quite.${explanation ? ' ' + explanation : ' See the correct answer above.'}`;
            feedback.textContent = (isCorrect ? '\u2713 ' : '\u2717 ') + feedbackText;
            feedback.className = 'quiz-feedback show ' + (isCorrect ? 'correct-feedback' : 'incorrect-feedback');
          }
        });
      });
    }

    // Reset button
    const resetBtn = document.getElementById('resetQuiz');
    if (resetBtn) {
      resetBtn.addEventListener('click', function() {
        document.querySelectorAll('.quiz-option').forEach(opt => {
          opt.classList.remove('selected', 'correct', 'incorrect');
        });
        document.querySelectorAll('.quiz-feedback').forEach(fb => {
          fb.className = 'quiz-feedback';
        });
      });
    }
  }

  function getVideoContent(skill) {
    if (skill.videoId) {
      return `
        <div class="video-wrapper">
          <iframe src="https://www.youtube.com/embed/${skill.videoId}" title="${skill.name} lesson video" loading="lazy"></iframe>
        </div>
        <p class="video-caption">Video lesson from JustinGuitar (embedded)</p>
        ${skill.lessonUrl ? `<a href="${skill.lessonUrl}" class="external-link-btn" target="_blank">Open full lesson on JustinGuitar <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>` : ''}
      `;
    } else if (skill.lessonUrl) {
      return `
        <div class="video-wrapper">
          <div class="video-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <span>Click to open lesson</span>
          </div>
        </div>
        <p class="video-caption">Full lesson available on JustinGuitar</p>
        <a href="${skill.lessonUrl}" class="external-link-btn" target="_blank">Open lesson on JustinGuitar <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a>
      `;
    } else {
      return `
        <div class="video-wrapper">
          <div class="video-placeholder">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="5 3 19 12 5 21 5 3"/>
            </svg>
            <span>Video coming soon</span>
          </div>
        </div>
        <p class="video-caption">A video lesson for this skill is coming soon!</p>
      `;
    }
  }

  function getPracticePrompt(skill) {
    const branch = skill.branch;
    
    const prompts = {
      'chords': `Practice forming the <strong>${skill.name}</strong> chord shape 10 times. Focus on getting all strings to ring clearly without buzzing. Feel the shape in your fingers so you can form it without thinking.`,
      'right-hand': `Practice the <strong>${skill.name}</strong> technique slowly and steadily. Start at a comfortable pace (around 60 BPM) and focus on precision and consistency. Gradually increase speed as you feel more confident.`,
      'left-hand': `Practice the <strong>${skill.name}</strong> movement on all six strings. Move smoothly and deliberately. Try playing along with a metronome set to 60 BPM to build rhythm and timing.`,
      'rhythm': `Practice the <strong>${skill.name}</strong> pattern using a metronome set to 60 BPM. Count out loud: "1, 2, 3, 4" to internalize the rhythm. Once comfortable, gradually increase the tempo.`,
      'transitions': `Practice transitioning between the chords in <strong>${skill.name}</strong>. Start slowly and focus on smooth, clean switches. Use a metronome at 60 BPM to keep a steady beat while switching.`,
      'reading': `Practice reading <strong>${skill.name}</strong> notation. Take it slowly at first, and don't worry about speed. Once you're comfortable recognizing the pattern, you can gradually play faster.`,
      'single-note': `Practice playing <strong>${skill.name}</strong> on different strings and frets. Make sure each note rings clearly and cleanly. This helps develop finger strength and control.`,
      'foundations': `Spend 5 minutes learning and memorizing <strong>${skill.name}</strong>. Try to apply this knowledge to your guitar. Understanding the basics will make everything else much easier!`,
      'songs': `Apply <strong>${skill.name}</strong> while playing a song you enjoy. Try to integrate this skill naturally into your playing rather than practicing it in isolation.`,
      'theory': `Study the concept of <strong>${skill.name}</strong> for 10 minutes. Write down key points or examples. Understanding the "why" behind guitar techniques makes them much easier to remember.`
    };

    return prompts[branch] || `Practice <strong>${skill.name}</strong> for at least 5-10 minutes. Focus on the technique and quality of your playing rather than speed.`;
  }

  function getUnlocksText(skill) {
    // Find all skills that have this skill as a prerequisite
    const unlockedSkills = Object.values(window.SKILL_DATA.skills).filter(s => 
      s.prerequisites && s.prerequisites.includes(skill.id)
    );

    if (unlockedSkills.length > 0) {
      return unlockedSkills.slice(0, 3).map(s => `• Unlocks: <strong>${s.name}</strong>`).join('<br>');
    }
    
    return '• Continue your learning journey with this skill as a foundation';
  }

  function loadProgressData(skillId) {
    // For now, set default mastery level to 0
    // In a real app, this would load from GuitarAPI.getProgress()
    updateMasteryDisplay(0, skillId);
  }

  function updateMasteryDisplay(level, skillId) {
    const masteryLevel = document.getElementById('masteryLevel');
    const masteryDots = document.getElementById('masteryDots');

    // Clear dots
    masteryDots.innerHTML = '';

    // Add 5 mastery dots
    for (let i = 1; i <= 5; i++) {
      const dot = document.createElement('div');
      dot.className = 'mastery-dot' + (i <= level ? ' active' : '');
      masteryDots.appendChild(dot);
    }

    masteryLevel.textContent = level;
  }

  function markSkillComplete(skillId) {
    // In a real app, this would call GuitarAPI.updateProgress(skillId, 'completed')
    console.log(`Marking skill ${skillId} as complete`);
    
    // Update UI to show completion
    const btn = document.getElementById('markCompleteBtn');
    btn.textContent = 'Marked as Complete!';
    btn.disabled = true;
    
    // Update mastery level to 5
    updateMasteryDisplay(5, skillId);
    
    // Reset button after 2 seconds
    setTimeout(() => {
      btn.textContent = 'Mark as Complete';
      btn.disabled = false;
    }, 2000);
  }

  function showError(title, message) {
    const skillPage = document.getElementById('skillPage');
    skillPage.innerHTML = `
